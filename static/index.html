<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>voice-polish</title>
<style>
  :root {
    color-scheme: light dark;
    --bg: #f6f6f8;
    --fg: #1a1a1a;
    --card: #ffffff;
    --accent: #4f46e5;
    --accent-rec: #dc2626;
    --muted: #6b7280;
    --border: #e5e7eb;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #16171a;
      --fg: #ececec;
      --card: #212226;
      --border: #33343a;
      --muted: #9ca3af;
    }
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    background: var(--bg);
    color: var(--fg);
    font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
    padding: 2rem 1rem;
  }
  main {
    width: 100%;
    max-width: 560px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 1.5rem;
  }
  h1 {
    font-size: 1.4rem;
    margin: 0;
  }
  .record-btn {
    width: 140px;
    height: 140px;
    border-radius: 50%;
    border: none;
    background: var(--accent);
    color: white;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    box-shadow: 0 4px 14px rgba(0,0,0,0.15);
    transition: transform 0.1s ease, background 0.2s ease;
  }
  .record-btn:active { transform: scale(0.96); }
  .record-btn.recording {
    background: var(--accent-rec);
    animation: pulse 1.4s infinite;
  }
  @keyframes pulse {
    0% { box-shadow: 0 0 0 0 rgba(220,38,38,0.5); }
    70% { box-shadow: 0 0 0 18px rgba(220,38,38,0); }
    100% { box-shadow: 0 0 0 0 rgba(220,38,38,0); }
  }
  .status {
    color: var(--muted);
    font-size: 0.9rem;
    min-height: 1.2em;
  }
  .upload-row {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    font-size: 0.85rem;
    color: var(--muted);
  }
  .card {
    width: 100%;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1.25rem;
    display: none;
    flex-direction: column;
    gap: 1rem;
  }
  .card.visible { display: flex; }
  .response-text {
    white-space: pre-wrap;
    line-height: 1.5;
    font-size: 1rem;
  }
  .actions {
    display: flex;
    gap: 0.6rem;
    align-items: center;
  }
  button.pill {
    border: 1px solid var(--border);
    background: transparent;
    color: var(--fg);
    padding: 0.45rem 0.9rem;
    border-radius: 999px;
    cursor: pointer;
    font-size: 0.9rem;
  }
  button.pill:hover { background: var(--border); }
  button.pill.selected { background: var(--accent); color: white; border-color: var(--accent); }
  button.pill:disabled { opacity: 0.5; cursor: default; }
  .feedback-thanks {
    font-size: 0.85rem;
    color: var(--muted);
  }
  input[type=file] { font-size: 0.85rem; }
</style>
</head>
<body>
<main>
  <h1>voice-polish</h1>

  <button id="recordBtn" class="record-btn">Record</button>
  <div id="status" class="status"></div>

  <div class="upload-row">
    or upload a file (.m4a / .mp3):
    <input id="fileInput" type="file" accept=".m4a,.mp3,audio/*" />
  </div>

  <div id="resultCard" class="card">
    <div id="responseText" class="response-text"></div>
    <div class="actions">
      <button id="copyBtn" class="pill">Copy</button>
      <button id="thumbUp" class="pill">👍</button>
      <button id="thumbDown" class="pill">👎</button>
      <span id="feedbackThanks" class="feedback-thanks"></span>
    </div>
  </div>
</main>

<script>
  const recordBtn = document.getElementById('recordBtn');
  const statusEl = document.getElementById('status');
  const fileInput = document.getElementById('fileInput');
  const resultCard = document.getElementById('resultCard');
  const responseTextEl = document.getElementById('responseText');
  const copyBtn = document.getElementById('copyBtn');
  const thumbUp = document.getElementById('thumbUp');
  const thumbDown = document.getElementById('thumbDown');
  const feedbackThanks = document.getElementById('feedbackThanks');

  let mediaRecorder = null;
  let audioChunks = [];
  let isRecording = false;
  let currentResponseText = '';

  recordBtn.addEventListener('click', async () => {
    if (!isRecording) {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        mediaRecorder = new MediaRecorder(stream);
        audioChunks = [];
        mediaRecorder.ondataavailable = (e) => { if (e.data.size > 0) audioChunks.push(e.data); };
        mediaRecorder.onstop = () => {
          stream.getTracks().forEach((t) => t.stop());
          const blob = new Blob(audioChunks, { type: mediaRecorder.mimeType || 'audio/webm' });
          sendAudio(blob, blob.type, 'recording.webm');
        };
        mediaRecorder.start();
        isRecording = true;
        recordBtn.textContent = 'Stop';
        recordBtn.classList.add('recording');
        statusEl.textContent = 'Recording...';
      } catch (err) {
        statusEl.textContent = 'Microphone access failed: ' + err.message;
      }
    } else {
      mediaRecorder.stop();
      isRecording = false;
      recordBtn.textContent = 'Record';
      recordBtn.classList.remove('recording');
      statusEl.textContent = 'Processing...';
    }
  });

  fileInput.addEventListener('change', () => {
    const file = fileInput.files[0];
    if (!file) return;
    statusEl.textContent = 'Processing...';
    sendAudio(file, file.type, file.name);
  });

  const MAX_ATTEMPTS = 3;
  const RETRY_DELAY_MS = 2000;
  const RETRYABLE_STATUSES = [429, 503];

  const sleep = (ms) => new Promise((resolve) => setTimeout(resolve, ms));

  async function sendAudio(blob, mimeType, filename) {
    resultCard.classList.remove('visible');
    resetFeedbackButtons();
    statusEl.textContent = 'Processing...';

    for (let attempt = 1; attempt <= MAX_ATTEMPTS; attempt++) {
      try {
        const formData = new FormData();
        formData.append('audio', blob, filename);
        const res = await fetch('/api/polish', { method: 'POST', body: formData });

        if (res.ok) {
          const data = await res.json();
          currentResponseText = data.text;
          responseTextEl.textContent = currentResponseText;
          resultCard.classList.add('visible');
          statusEl.textContent = '';
          return;
        }

        if (RETRYABLE_STATUSES.includes(res.status) && attempt < MAX_ATTEMPTS) {
          statusEl.textContent = `Retrying... (attempt ${attempt + 1} of ${MAX_ATTEMPTS})`;
          await sleep(RETRY_DELAY_MS);
          continue;
        }

        const err = await res.json().catch(() => ({}));
        statusEl.textContent = 'Error: ' + (err.detail || `Request failed (${res.status})`);
        return;
      } catch (err) {
        statusEl.textContent = 'Error: ' + err.message;
        return;
      }
    }
  }

  copyBtn.addEventListener('click', async () => {
    await navigator.clipboard.writeText(currentResponseText);
    const original = copyBtn.textContent;
    copyBtn.textContent = 'Copied!';
    setTimeout(() => { copyBtn.textContent = original; }, 1200);
  });

  thumbUp.addEventListener('click', () => sendFeedback('up'));
  thumbDown.addEventListener('click', () => sendFeedback('down'));

  async function sendFeedback(rating) {
    try {
      await fetch('/api/feedback', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ text: currentResponseText, rating }),
      });
      thumbUp.disabled = true;
      thumbDown.disabled = true;
      (rating === 'up' ? thumbUp : thumbDown).classList.add('selected');
      feedbackThanks.textContent = 'Thanks for the feedback!';
    } catch (err) {
      feedbackThanks.textContent = 'Feedback failed to save.';
    }
  }

  function resetFeedbackButtons() {
    thumbUp.disabled = false;
    thumbDown.disabled = false;
    thumbUp.classList.remove('selected');
    thumbDown.classList.remove('selected');
    feedbackThanks.textContent = '';
  }
</script>
</body>
</html>
